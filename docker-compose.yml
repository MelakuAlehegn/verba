# Self-contained local stack: one command boots Postgres, Redis, Qdrant, MinIO,
# the API, and the Celery worker.
#
#   docker compose up --build
#
# Host ports are OFFSET from the hand-run dev containers (5432/6333/6379/9000-1)
# so both can run at once. From the host, inspect the compose stack at:
#   API        http://localhost:8000
#   Postgres   localhost:5442            (in-container: postgres:5432)
#   Qdrant UI  http://localhost:6343/dashboard
#   Redis      localhost:6380
#   MinIO API  http://localhost:9002   console http://localhost:9011
# Containers talk to each other by service name on the internal network.
#
# Secrets (GOOGLE_API_KEY, OAuth, SESSION_SECRET) come from backend/.env; the
# service-name connection URLs below override the localhost ones in that file.
name: document-qa-rag

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: document_qa_rag
    ports:
      - "5442:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d document_qa_rag"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6343:6333"
      - "6344:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000"
      - "9011:9001"
    volumes:
      - miniodata:/data

  # One-shot: create the documents bucket, then exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 2; done;
      mc mb --ignore-existing local/documents;
      "

  api:
    build: ./backend
    image: document-qa-rag-backend
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/document_qa_rag
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT_URL: http://minio:9000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build: ./backend
    image: document-qa-rag-backend
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/document_qa_rag
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_started

volumes:
  pgdata:
  qdrantdata:
  miniodata:
